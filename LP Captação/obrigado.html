<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0b0b0b;
    --terra: #c26b3a;
    --white: #fff;
    --off: #efefef;
    --muted: #a9a9a9;
    --line: #292929;
  }
  html, body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--white);
    font-family: 'Raleway', Arial, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
  }
  @import url('https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;700;800&display=swap');
  .container {
    padding: 2rem;
    max-width: 520px;
  }
  .check {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    border: 2px solid var(--terra);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 32px;
    animation: pop .4s cubic-bezier(.16,1,.3,1) both;
  }
  @keyframes pop {
    from { transform: scale(0.5); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }
  .check svg { width: 28px; height: 28px; stroke: var(--terra); fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
  .eyebrow {
    font-size: 0.6rem;
    font-weight: 800;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--terra);
    margin-bottom: 14px;
  }
  h1 {
    font-size: clamp(2rem, 7vw, 3rem);
    font-weight: 800;
    line-height: 1.1;
    color: var(--off);
    margin-bottom: 16px;
  }
  p {
    color: var(--muted);
    font-size: 1rem;
    line-height: 1.75;
    margin-bottom: 36px;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    border: 1px solid var(--terra);
    color: var(--terra);
    padding: 14px 28px;
    font-family: 'Raleway', Arial, sans-serif;
    font-size: 0.62rem;
    font-weight: 800;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    text-decoration: none;
    transition: background .25s, color .25s;
  }
  .btn:hover { background: var(--terra); color: var(--bg); }
  .counter {
    margin-top: 20px;
    font-size: 0.82rem;
    color: #555;
  }
</style>
</head>
<body>
<div class="container">
  <div class="check">
    <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
  </div>
  <div class="eyebrow">Mensagem enviada</div>
  <h1>Recebido.<br>Fala comigo no<br>WhatsApp.</h1>
  <p>Suas respostas chegaram pra mim. Abrindo o WhatsApp agora para a gente conversar.</p>
  <a id="wa-btn" class="btn" href="#">
    Abrir WhatsApp
  </a>
  <p class="counter" id="counter">Abrindo em <span id="sec">3</span>s…</p>
</div>

<script>
  const params = new URLSearchParams(location.search);
  const waUrl = params.get('wa') || 'https://wa.me/5561981784728';

  document.getElementById('wa-btn').addEventListener('click', function(e) {
    e.preventDefault();
    window.location.href = waUrl;
  });

  let s = 3;
  const el = document.getElementById('sec');
  const t = setInterval(() => {
    s--;
    el.textContent = s;
    if (s <= 0) {
      clearInterval(t);
      document.getElementById('counter').textContent = 'Se não abriu, clique no botão acima.';
      window.location.href = waUrl;
    }
  }, 1000);
</script>
</body>
</html>
