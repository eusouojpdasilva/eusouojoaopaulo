<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Protocolo da Liberdade — JP</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0D0D0D;
    color: #F0E8D8;
    font-family: 'Georgia', serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .container {
    text-align: center;
    padding: 2rem;
    max-width: 600px;
  }
  .eyebrow {
    font-size: 0.85rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #C26B3A;
    margin-bottom: 1.5rem;
  }
  h1 {
    font-size: clamp(2rem, 6vw, 3.5rem);
    font-weight: 400;
    line-height: 1.2;
    margin-bottom: 1.5rem;
  }
  h1 span { color: #C26B3A; }
  p {
    font-size: 1.1rem;
    line-height: 1.7;
    color: #9a9388;
    margin-bottom: 2.5rem;
  }
  .badge {
    display: inline-block;
    border: 1px solid rgba(194,107,58,0.4);
    color: #C26B3A;
    padding: 0.5rem 1.25rem;
    border-radius: 999px;
    font-size: 0.85rem;
    letter-spacing: 0.1em;
  }
</style>
</head>
<body>
<div class="container">
  <div class="eyebrow">Em breve</div>
  <h1>Protocolo da<br><span>Liberdade</span></h1>
  <p>Uma metodologia para quem quer construir renda com liberdade real — sem fórmulas prontas, sem atalhos.</p>
  <div class="badge">Página em construção</div>
</div>
</body>
</html>
